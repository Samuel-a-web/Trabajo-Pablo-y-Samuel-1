<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - El Crustáceo Crujiente</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito+Sans:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>
    <!-- Header con Bootstrap Navbar (será reemplazado por componente) -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <div class="logo-icon d-inline-block align-middle">
                    <svg viewBox="0 0 100 100" width="50" height="50">
                        <ellipse cx="50" cy="60" rx="35" ry="25" fill="#f5f5dc" stroke="#8B4513" stroke-width="3" />
                        <path d="M15 55 Q50 20 85 55" fill="#f5f5dc" stroke="#8B4513" stroke-width="3" />
                        <text x="50" y="45" text-anchor="middle" fill="#CC0000" font-size="12"
                            font-family="'Luckiest Guy', cursive">THE</text>
                        <text x="50" y="60" text-anchor="middle" fill="#CC0000" font-size="14"
                            font-family="'Luckiest Guy', cursive">KRUSTY</text>
                        <text x="50" y="75" text-anchor="middle" fill="#CC0000" font-size="14"
                            font-family="'Luckiest Guy', cursive">KRAB</text>
                    </svg>
                </div>
                <span class="logo-text d-none d-md-inline">CRUSTÁCEO CRUJIENTE</span>
            </a>

            <!-- Checkbox Hack for No-JS Mobile Menu -->
            <input type="checkbox" id="nav-toggle" class="d-none">
            <label for="nav-toggle" class="navbar-toggler" style="cursor: pointer;">
                <span class="navbar-toggler-icon"></span>
            </label>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">INICIO</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="menu.html">CARTA</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">NOSOTROS</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a href="menu.html" class="btn btn-outline-light btn-sm me-2">PEDIR</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="hero d-flex align-items-center justify-content-center" style="min-height: 40vh;">
        <div class="text-center z-1">
            <h1 class="display-1 text-warning"
                style="font-family: var(--font-heading); text-shadow: 4px 4px 0 var(--krusty-red);">GALLEY GRUB</h1>
            <p class="lead text-white">Comida grasienta para marineros hambrientos</p>
        </div>
        <div class="bubbles">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </header>

    <!-- Menu Content (será generado dinámicamente) -->
    <section class="py-5" data-section="menu">
        <div class="container">
            <!-- El menú será renderizado aquí por el controlador -->
        </div>
    </section>

    <!-- Footer (será reemplazado por componente) -->
    <footer class="footer pt-4 pb-2"></footer>

    <!-- Scripts de la aplicación MVC -->
    <script type="module" src="../js/app.js"></script>
</body>

</html>
