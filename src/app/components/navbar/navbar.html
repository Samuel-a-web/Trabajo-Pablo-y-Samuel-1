<nav class="navbar navbar-expand-lg fixed-top sym-navbar">
  <div class="container d-flex justify-content-between align-items-center position-relative">
    
    <!-- Mobile brand (Left) -->
    <a class="navbar-brand d-lg-none sym-brand-mobile" routerLink="/inicio">
      <img src="/assets/logo-cangrejo.png" width="50" height="50" alt="El Crustáceo Crujiente">
      <span class="ms-2 sym-brand-mobile-text">CRUSTÁCEO CRUJIENTE</span>
    </a>

    <!-- Toggler (Right) -->
    <button class="navbar-toggler sym-toggler border-0" type="button"
      data-bs-toggle="offcanvas" data-bs-target="#navbarOffcanvas"
      aria-controls="navbarOffcanvas" aria-label="Abrir menú">
      <i class="bi bi-list fs-1 text-warning"></i>
    </button>

    <div class="offcanvas offcanvas-end sym-offcanvas" tabindex="-1" id="navbarOffcanvas">
      <div class="offcanvas-header sym-offcanvas-header p-4">
        <h5 class="offcanvas-title text-warning m-0" style="font-family: var(--font-heading); font-size: 1.5rem;">MENÚ</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
      </div>
      
      <div class="offcanvas-body p-0">
        <!-- Desktop Layout -->
        <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-lg-between w-100 p-4 p-lg-0">
          
          <!-- Left Links -->
          <ul class="navbar-nav sym-nav-list left-nav mb-4 mb-lg-0 justify-content-lg-end w-100 gap-2 gap-lg-4">
            <li class="nav-item">
              <a class="nav-link sym-nav-link text-lg-end" routerLink="/inicio" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeOffcanvas()">INICIO</a>
            </li>
            <li class="nav-item">
              <a class="nav-link sym-nav-link text-lg-end" routerLink="/menu" routerLinkActive="active" (click)="closeOffcanvas()">CARTA</a>
            </li>
          </ul>

          <!-- Center Logo (Desktop Only) -->
          <div class="d-none d-lg-flex justify-content-center align-items-center mx-5 sym-brand-container">
            <a class="sym-brand-desktop" routerLink="/inicio">
              <div class="sym-logo-wrapper">
                <img src="/assets/logo-cangrejo.png" alt="El Crustáceo Crujiente">
              </div>
            </a>
          </div>

          <!-- Right Links -->
          <ul class="navbar-nav sym-nav-list right-nav justify-content-lg-start w-100 gap-2 gap-lg-4">
            <li class="nav-item">
              <a class="nav-link sym-nav-link text-lg-start" routerLink="/about" routerLinkActive="active" (click)="closeOffcanvas()">NOSOTROS</a>
            </li>
            <li class="nav-item mt-4 mt-lg-0 d-flex align-items-lg-center justify-content-lg-start">
              <a routerLink="/order" class="btn sym-order-btn w-100 position-relative" style="max-width: 200px;" (click)="closeOffcanvas()">
                PEDIR AHORA
                @if (cartService.totalItemsCount() > 0) {
                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light">
                    {{ cartService.totalItemsCount() }}
                  </span>
                }
              </a>
            </li>
            
            <!-- Auth User Area -->
            <li class="nav-item ms-lg-3 mt-4 mt-lg-0 d-flex align-items-center justify-content-lg-start position-relative">
              @if (authService.currentUser()) {
                <div class="dropdown">
                  <button class="btn btn-link text-warning text-decoration-none dropdown-toggle p-0 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle fs-4"></i>
                    <span class="d-lg-none d-xl-inline">Hola, {{ authService.currentUser()?.username }}</span>
                  </button>
                  <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow-lg mt-2" style="background: rgba(26, 10, 0, 0.95); border: 1px solid var(--krusty-red); border-radius: 12px; backdrop-filter: blur(10px);">
                    <li>
                      <a class="dropdown-item text-white py-2" href="javascript:void(0)" (click)="logout()">
                        <i class="bi bi-box-arrow-right me-2 text-warning"></i>Cerrar sesión
                      </a>
                    </li>
                  </ul>
                </div>
              } @else {
                <button class="btn btn-link text-white-50 text-decoration-none p-0 d-flex align-items-center gap-2 sym-nav-link border-0 bg-transparent" (click)="openAuthModal()">
                  <i class="bi bi-person-circle fs-4"></i>
                  <span class="d-lg-none d-xl-inline">Ingresar</span>
                </button>
              }
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<app-auth-modal #authModal></app-auth-modal>
